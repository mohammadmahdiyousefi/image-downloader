name: Download Images

on:
  workflow_dispatch:
  push:
    paths: ['links.txt']

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install requests
        run: pip install requests
      
      - name: Run downloader
        run: python download_images.py
      
      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: images
          path: images/
      
      - name: Upload failed list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-links
          path: failed.txt
