name: Download Images

on:
  # اجرای دستی از طریق Actions tab
  workflow_dispatch:
    inputs:
      links_file:
        description: 'نام فایل حاوی لینک‌ها (پیش‌فرض links.txt)'
        required: false
        default: 'links.txt'
  # یا به ازای هر push روی main که فایل links.txt تغییر کند
  push:
    paths:
      - 'links.txt'
    branches:
      - main

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run download script
        run: python download_images.py
        env:
          # در صورت نیاز به متغیر محیطی (مثلاً برای User-Agent خاص) می‌توانید تنظیم کنید
          USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-images
          path: images/
          if-no-files-found: warn

      - name: Upload failed links log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-log
          path: failed.txt
          if-no-files-found: ignore
